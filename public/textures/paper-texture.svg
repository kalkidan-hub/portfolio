<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" preserveAspectRatio="none">
  <filter id="noise" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="t" />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.06"/>
    </feComponentTransfer>
  </filter>
  <rect width="100%" height="100%" fill="#fbf7f1" />
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.06"/>
</svg>