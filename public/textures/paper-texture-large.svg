<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 2400 1600" preserveAspectRatio="xMidYMid slice">
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" result="noise" />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.08"/>
    </feComponentTransfer>
  </filter>

  <rect width="100%" height="100%" fill="#fdf9f5" />
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.08" />
  <g opacity="0.06">
    <defs>
      <radialGradient id="stain" cx="40%" cy="20%" r="60%">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.6" />
        <stop offset="100%" stop-color="#ddd" stop-opacity="0.02" />
      </radialGradient>
    </defs>
    <ellipse cx="2000" cy="200" rx="600" ry="260" fill="url(#stain)" />
  </g>
</svg>